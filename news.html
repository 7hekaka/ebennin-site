<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News – Ernest Bennin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>

<body>
  <nav class="navbar">
    <div class="logo">Ernest&nbsp;Bennin</div>
    <div id="menu-toggle" class="menu-toggle" aria-label="Open menu" role="button">☰</div>
    <ul id="nav-links" class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="research.html">Research</a></li>
      <li><a href="publications.html">Publications</a></li>
      <li><a href="projects.html">Projects & Awards</a></li>
      <li><a href="news.html" aria-current="page">News</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <header class="page-hero">
    <div class="container">
      <h1>News</h1>
      <p>Recent updates, milestones, conference activity, and research highlights.</p>
    </div>
  </header>

  <section class="section">
    <div class="container">
      <div id="news-grid" class="grid"></div>
    </div>
  </section>

  <footer>
    <div class="container">
      <p>&copy; <span id="year"></span> Ernest Bennin. All rights reserved.</p>
    </div>
  </footer>

  <script type="module">
    import { loadSiteData, setYear, wireMobileNav, card } from './pages/_shared.js';

    function sortNews(items) {
      return [...items].sort((a, b) => {
        const da = new Date(a.date || '');
        const db = new Date(b.date || '');
        return db - da;
      });
    }

    (async () => {
      setYear();
      wireMobileNav();
      const data = await loadSiteData();

      const grid = document.getElementById('news-grid');
      const items = Array.isArray(data.news) ? sortNews(data.news) : [];

      grid.innerHTML = '';

      items.forEach((it) => {
        const description = it.date
          ? `${it.date}\n\n${it.description || ''}`
          : (it.description || '');

        const node = card({
          title: it.title || '',
          description,
          image: it.image || ''
        }, 'news');

        grid.appendChild(node);
      });
    })();
  </script>

  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>
